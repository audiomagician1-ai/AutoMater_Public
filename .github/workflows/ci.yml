name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      # NOTE: vitest v4 + v8 coverage 在 Windows 下统计异常 (bug #9457)
      # 阈值暂时禁用,仅生成报告用于手动检查
      # - name: Coverage check
      #   run: pnpm test:coverage
